apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-auth-service
  namespace: default
  labels:
    app: garage-auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: garage-auth-service
  template:
    metadata:
      labels:
        app: garage-auth-service
    spec:
      containers:
        - name: garage-auth-service
          image: 500431122450.dkr.ecr.us-east-1.amazonaws.com/garage-app:auth-latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: garage-auth-service-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: garage-auth-service-secrets
                  key: DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: garage-auth-service-secrets
                  key: RABBITMQ_URL
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-auth-service-secrets
                  key: JWT_PRIVATE_KEY
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-auth-service-secrets
                  key: JWT_PUBLIC_KEY
            - name: API_GATEWAY_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: garage-auth-service-secrets
                  key: API_GATEWAY_ISSUER_URL
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secrets
                  key: DD_API_KEY
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          resources:
            requests:
              memory: "256Mi"
              cpu: "125m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
