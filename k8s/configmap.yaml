apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-auth-service-config
  namespace: default
data:
  PORT: "8083"
  NODE_ENV: "production"
  JWT_EXPIRES_IN: "8h"
  AWS_REGION: "us-east-1"
